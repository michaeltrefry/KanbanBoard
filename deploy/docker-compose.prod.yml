networks:
  trefry-network:
    external: true

services:
  kanban-api:
    image: ${KANBAN_API_IMAGE:?KANBAN_API_IMAGE is required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KANBAN_API_HTTP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      KANBAN_DATA_DIR: /data
      Auth__Enabled: ${Auth__Enabled:-false}
      Auth__Authority: ${Auth__Authority:-}
      Auth__ClientId: ${Auth__ClientId:-}
      Auth__ClientSecret: ${Auth__ClientSecret:-}
      Auth__RequireHttpsMetadata: ${Auth__RequireHttpsMetadata:-true}
      Auth__CallbackPath: ${Auth__CallbackPath:-/signin-oidc}
      Auth__SignedOutCallbackPath: ${Auth__SignedOutCallbackPath:-/signout-callback-oidc}
      PersonalAccessTokens__Enabled: ${PersonalAccessTokens__Enabled:-false}
      PersonalAccessTokens__EncryptionKey: ${PersonalAccessTokens__EncryptionKey:-}
      PersonalAccessTokens__TokenPrefix: ${PersonalAccessTokens__TokenPrefix:-kbp}
    volumes:
      - ./data:/data
    networks:
      - default
      - trefry-network

  kanban-mcp:
    image: ${KANBAN_MCP_IMAGE:?KANBAN_MCP_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - kanban-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:3000
      KANBAN_API_BASE_URL: http://kanban-api:8080
    expose:
      - "3000"
    networks:
      - default
      - trefry-network
