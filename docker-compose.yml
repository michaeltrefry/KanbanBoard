networks:
  trefry-network:
    external: true
services:
  kanban-api:
    build:
      context: .
      dockerfile: ./KanbanBoard.Api/Dockerfile
    ports:
      - "127.0.0.1:${KANBAN_DOCKER_HTTPS_PORT:-8444}:8443"
    environment:
      ASPNETCORE_URLS: https://+:8443;http://+:8080
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/localhost.pem
      ASPNETCORE_Kestrel__Certificates__Default__KeyPath: /https/localhost-key.pem
      ConnectionStrings__Kanban: ${ConnectionStrings__Kanban:?ConnectionStrings__Kanban is required}
      Database__CommandTimeoutSeconds: ${Database__CommandTimeoutSeconds:-30}
      Auth__Enabled: ${Auth__Enabled:-false}
      Auth__Authority: ${Auth__Authority:-}
      Auth__ClientId: ${Auth__ClientId:-}
      Auth__ClientSecret: ${Auth__ClientSecret:-}
      Auth__RequireHttpsMetadata: ${Auth__RequireHttpsMetadata:-false}
      Auth__CallbackPath: ${Auth__CallbackPath:-/signin-oidc}
      Auth__SignedOutCallbackPath: ${Auth__SignedOutCallbackPath:-/signout-callback-oidc}
      PersonalAccessTokens__Enabled: ${PersonalAccessTokens__Enabled:-false}
      PersonalAccessTokens__EncryptionKey: ${PersonalAccessTokens__EncryptionKey:-}
      PersonalAccessTokens__TokenPrefix: ${PersonalAccessTokens__TokenPrefix:-kbp}
      InternalApi__SharedSecret: ${InternalApi__SharedSecret:-}
    volumes:
      - ./certs:/https:ro
  kanban-mcp:
    build:
      context: .
      dockerfile: ./KanbanBoard.Mcp/Dockerfile
    ports:
      - "127.0.0.1:${KANBAN_MCP_HTTPS_PORT:-3001}:3001"
    depends_on:
      - kanban-api
    environment:
      ASPNETCORE_URLS: https://+:3001;http://+:3000
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/localhost.pem
      ASPNETCORE_Kestrel__Certificates__Default__KeyPath: /https/localhost-key.pem
      KANBAN_API_BASE_URL: http://kanban-api:8080
      InternalApi__SharedSecret: ${InternalApi__SharedSecret:-}
      McpAuthentication__RequirePersonalAccessToken: ${McpAuthentication__RequirePersonalAccessToken:-true}
      McpAuthentication__ValidationCacheSeconds: ${McpAuthentication__ValidationCacheSeconds:-30}
    volumes:
      - ./certs:/https:ro
    networks:
      - default
      - trefry-network
